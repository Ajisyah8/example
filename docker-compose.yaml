version: "3.3"
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: laravel_app
    restart: always
    volumes:
      - .:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/letsencrypt:/etc/letsencrypt
    command: >
      /bin/sh -c "
      if [ ! -f /etc/letsencrypt/live/mytestingid.com/fullchain.pem ]; then
        mkdir -p /etc/letsencrypt/live/mytestingid.com;
        openssl req -x509 -nodes -newkey rsa:2048 -days 1
          -keyout /etc/letsencrypt/live/mytestingid.com/privkey.pem
          -out /etc/letsencrypt/live/mytestingid.com/fullchain.pem
          -subj '/CN=mytestingid.com';
      fi;
      nginx -g 'daemon off;'
      "
    depends_on:
      - app
    networks:
      - default

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          certbot renew --webroot -w /var/www/certbot --quiet || true;
          sleep 12h;
        done

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
